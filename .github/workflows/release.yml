name: Release

on:
  push:
    tags:
      - "v*"

jobs:

  release:

    runs-on: windows-latest

    permissions:
      contents: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install .NET Core
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: 10.0.x

    - name: Publish app
      run: dotnet publish VRCGPUTool\VRCGPUTool.csproj --configuration Release --runtime win-x64 --self-contained false -p:PublishSingleFile=true

    - name: Publish service
      run: dotnet publish NvidiaSmiProxy\NvidiaSmiProxy.csproj --configuration Release --runtime win-x64 --self-contained false -p:PublishSingleFile=true

    - name: Build installer
      run: iscc setup.iss

    - name: Upload to GitHub Releases
      uses: softprops/action-gh-release@v2
      with:
        files: dist\*.exe
